<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/tags_icon.png') }}">
    <title>Explorar Colección</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/inicio.js') }}"></script>
    
</head>
<body>

    <!-- Botón para regresar a la cuadrícula principal -->
        <a href="#" onclick="regresarAlInicio(); return false;" class="botono_texto">⮌ Volver al cine&emsp;</a>
    

    <div class="contenedorresponsivo" style="margin: 0; padding-bottom: 0;">
        <img src="{{ url_for('static', filename='img/tags_icon.png') }}" style="width: 3em; height: auto;"> <span><h1> Explorar Etiquetas </h1></span>
    </div>

    <!-- SECCIÓN DE BÚSQUEDA -->
    <div class="contenedor_grisoscuro" style="margin-bottom: 40px;">
        <!-- El formulario apunta a 'inicio' para que envíe la consulta a tu cuadrícula principal -->
        <!-- Agregamos un ID al formulario para controlarlo con JavaScript -->
        <form action="{{ url_for('inicio') }}" method="GET" id="form_explorar">
            <input type="hidden" name="modo_busqueda" value="and">
            <input type="hidden" name="orden" value="alfabetico"> <!-- Aseguramos el orden correcto -->
            
            <!-- NUEVO: Input oculto que enviará el formato JSON -->
            <input type="hidden" name="q" id="hidden_q">
            
            <!-- Al input visible le quitamos el name="q" para que no viaje en la URL -->
            <input type="text" id="search_box" class="inputdetexto" placeholder="Selecciona etiquetas de abajo...">
            
            <button type="submit" class="botono">
                Buscar
            </button>
        </form>
    </div>

    <!-- SECCIÓN DE BOTONES DE ETIQUETAS -->
    <div class="grid-tags">
        <!-- Generamos un botón por cada etiqueta que nos envió el código de Python -->
        {% for tag in tags %}
            <!-- Al hacer clic, llamamos a la función de JavaScript pasándole el nombre de la etiqueta -->
            <button class="botono2" onclick="agregarAlBuscador('{{ tag.nombre }}')">
                {{ tag.nombre }}
            </button>
        {% endfor %}
    </div>

    <!-- LÓGICA DE PROGRAMACIÓN EN EL NAVEGADOR (JAVASCRIPT) -->
    <script>
            // Función 1: Agregar el texto al cuadro visible (Igual que antes)
            function agregarAlBuscador(nombreTag) {
                var input = document.getElementById('search_box');
                
                if (input.value.length > 0) {
                    input.value = input.value + "," + nombreTag;
                } else {
                    input.value = nombreTag;
                }
                
                input.focus();
            }

            // Función 2: El "Traductor" que se activa al presionar Buscar
            document.getElementById('form_explorar').addEventListener('submit', function(e) {
                var inputVisible = document.getElementById('search_box');
                var inputOculto = document.getElementById('hidden_q');
                
                if (inputVisible.value.length > 0) {
                    // Separamos el texto por comas
                    var tagsArray = inputVisible.value.split(',');
                    
                    // Lo convertimos en la estructura JSON que usa Tagify
                    var jsonTags = tagsArray.map(function(tag) { 
                        return { "value": tag.trim() }; 
                    }).filter(function(tag) {
                        return tag.value !== ""; // Evitamos enviar etiquetas en blanco
                    });
                    
                    // Guardamos el JSON en el input oculto que viaja al servidor
                    inputOculto.value = JSON.stringify(jsonTags);
                }
            });
        </script>

</body>
</html>
